<svg viewBox="0 0 13 11" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Claude Code Pixel Mascot · Orange #D97757 · 13×11 grid -->
  <g fill="#D97757">
    <!-- Top: 머리 (5 wide) -->
    <rect x="4" y="1" width="5" height="2"/>
    <!-- Upper body bar -->
    <rect x="2" y="3" width="9" height="1"/>
    <!-- Eye row (2 vertical slot eyes) -->
    <rect x="2" y="4" width="2" height="2"/>
    <rect x="5" y="4" width="1" height="2"/>
    <rect x="7" y="4" width="1" height="2"/>
    <rect x="9" y="4" width="2" height="2"/>
    <!-- Lower body bar -->
    <rect x="2" y="6" width="9" height="1"/>
    <!-- Wide body (shoulders out) -->
    <rect x="1" y="7" width="11" height="2"/>
    <!-- Legs (6 legs alternating) -->
    <rect x="1" y="9" width="1" height="2"/>
    <rect x="3" y="9" width="1" height="2"/>
    <rect x="5" y="9" width="1" height="2"/>
    <rect x="7" y="9" width="1" height="2"/>
    <rect x="9" y="9" width="1" height="2"/>
    <rect x="11" y="9" width="1" height="2"/>
  </g>
</svg>
