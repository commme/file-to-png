<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' blob: data:; connect-src 'self' blob: https://cdnjs.cloudflare.com;">
<title>PDF → PNG 변환기</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf7;
    --ink: #0a0a0a;
    --ink-2: #666666;
    --ink-3: #999999;
    --accent: #ddff00;
    --surface: #ffffff;
    --surface-2: #f0f0eb;
    --danger: #ff3333;
    --success: #00cc44;
    --warning: #ffaa00;
    --bw: 3px;
    --bw-thin: 2px;
    --shadow: 8px 8px 0 #0a0a0a;
    --shadow-sm: 4px 4px 0 #0a0a0a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Pretendard', -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 48px 20px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
  }
  .mono {
    font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
    letter-spacing: 0;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }
  .logo {
    width: 48px;
    height: 48px;
    border-radius: 0;
    background: var(--accent);
    border: var(--bw) solid var(--ink);
    box-shadow: var(--shadow-sm);
    display: grid;
    place-items: center;
    font-size: 22px;
  }
  h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--ink);
    text-transform: uppercase;
  }
  .subtitle {
    font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
    color: var(--ink-2);
    font-size: 12px;
    margin-bottom: 28px;
    margin-left: 62px;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: var(--bw) solid var(--ink);
    border-radius: 0;
    box-shadow: var(--shadow);
    padding: 24px;
    margin-bottom: 20px;
  }

  /* Drop zone */
  .drop-zone {
    border: var(--bw) dashed var(--ink);
    border-radius: 0;
    padding: 56px 20px;
    text-align: center;
    transition: all 0.12s ease;
    cursor: pointer;
    background: var(--surface-2);
    position: relative;
    overflow: hidden;
  }
  .drop-zone:hover {
    background: var(--accent);
  }
  .drop-zone:hover .drop-hint,
  .drop-zone.dragover .drop-hint {
    color: var(--ink);
  }
  .drop-zone.dragover {
    background: var(--accent);
    border-style: solid;
  }
  .drop-zone.processing { border-color: var(--success); }
  .drop-icon {
    font-size: 42px;
    margin-bottom: 12px;
    display: block;
    position: relative;
  }
  .drop-text {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
    position: relative;
    text-transform: uppercase;
    letter-spacing: -0.01em;
  }
  .drop-hint {
    font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
    font-size: 11px;
    color: var(--ink-2);
    position: relative;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  input[type="file"] { display: none; }

  /* Options */
  .options {
    display: flex;
    gap: 16px;
    margin-top: 18px;
    flex-wrap: wrap;
  }
  .option {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--ink);
  }
  .option label {
    font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  select {
    padding: 8px 12px;
    border: var(--bw) solid var(--ink);
    border-radius: 0;
    font-size: 13px;
    background: var(--surface);
    color: var(--ink);
    font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
    font-weight: 600;
    cursor: pointer;
    outline: none;
    transition: all 0.12s;
    box-shadow: var(--shadow-sm);
  }
  select:hover { background: var(--accent); }
  select:focus { background: var(--accent); }

  /* Banner */
  .banner {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    background: var(--accent);
    border: var(--bw) solid var(--ink);
    box-shadow: var(--shadow-sm);
    padding: 14px 16px;
    border-radius: 0;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--ink);
    font-weight: 500;
  }
  .banner code {
    background: var(--ink);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 0;
    font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
    font-size: 12px;
    font-weight: 600;
  }

  /* Progress */
  .progress {
    margin-top: 16px;
    height: 12px;
    background: var(--surface-2);
    border: var(--bw-thin) solid var(--ink);
    border-radius: 0;
    overflow: hidden;
    display: none;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0;
    transition: width 0.3s;
  }

  /* Results */
  .results { margin-top: 8px; }
  .file-block {
    background: var(--surface);
    border: var(--bw) solid var(--ink);
    border-radius: 0;
    box-shadow: var(--shadow);
    padding: 18px;
    margin-bottom: 20px;
  }
  .file-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .file-name {
    font-weight: 700;
    font-size: 14px;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .file-meta {
    font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
    font-size: 11px;
    color: var(--ink-2);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: var(--accent);
    border: var(--bw-thin) solid var(--ink);
    border-radius: 0;
    font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
    font-size: 10px;
    color: var(--ink);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
  }
  .preview {
    border: var(--bw-thin) solid var(--ink);
    border-radius: 0;
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 1/1.4;
    background: var(--surface-2);
    transition: all 0.12s;
    position: relative;
  }
  .preview:hover {
    transform: translate(-2px, -2px);
    box-shadow: 4px 4px 0 var(--ink);
  }
  .preview::after {
    content: '⬇';
    position: absolute;
    inset: 0;
    background: rgba(10,10,10,0.7);
    color: var(--accent);
    display: grid;
    place-items: center;
    font-size: 24px;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.12s;
  }
  .preview:hover::after { opacity: 1; }
  .preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Buttons */
  .actions {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .btn {
    flex: 1;
    padding: 14px 20px;
    border: var(--bw) solid var(--ink);
    border-radius: 0;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s ease;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    box-shadow: var(--shadow-sm);
    text-transform: uppercase;
    letter-spacing: 0.01em;
  }
  .btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--ink);
  }
  .btn:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 var(--ink);
  }
  .btn-primary {
    background: var(--accent);
    color: var(--ink);
  }
  .btn-secondary {
    background: var(--surface);
    color: var(--ink);
    flex: 0 0 auto;
    padding: 14px 20px;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 40px;
    padding-top: 20px;
    border-top: var(--bw-thin) solid var(--ink);
    font-family: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
    color: var(--ink-2);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .sns-row{display:inline-flex;gap:10px;margin-top:10px}
  .sns-row a{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:var(--bw-thin) solid var(--ink);background:#fff;color:var(--ink);transition:background .15s}
  .sns-row a:hover{background:var(--accent)}
  .sns-row svg{width:14px;height:14px;display:block}
  .footer a {
    color: var(--ink);
    text-decoration: underline;
    text-decoration-thickness: 2px;
    text-underline-offset: 3px;
  }
  .footer strong { color: var(--ink); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">📄</div>
    <h1>PDF → PNG</h1>
  </div>
  <p class="subtitle">PDF를 끌어다 놓으면 즉시 이미지로 변환됩니다 · 파일은 서버에 전송되지 않습니다</p>

  <div class="banner">
    <span>💡</span>
    <span>HWP 파일은 브라우저 변환 불가 — <code>convert.py</code> 스크립트를 사용하세요</span>
  </div>

  <div class="card">
    <div id="dropZone" class="drop-zone">
      <span class="drop-icon">📁</span>
      <div class="drop-text">클릭하거나 PDF 파일을 끌어다 놓으세요</div>
      <div class="drop-hint">여러 파일 동시 업로드 가능</div>
      <input type="file" id="fileInput" accept=".pdf" multiple>
    </div>

    <div class="options">
      <div class="option">
        <label>해상도</label>
        <select id="dpi">
          <option value="100">100 DPI · 작게</option>
          <option value="150">150 DPI · 보통</option>
          <option value="200" selected>200 DPI · 고화질</option>
          <option value="300">300 DPI · 인쇄급</option>
        </select>
      </div>
      <div class="option">
        <label>형식</label>
        <select id="format">
          <option value="image/png" selected>PNG</option>
          <option value="image/jpeg">JPEG</option>
          <option value="image/webp">WebP</option>
        </select>
      </div>
    </div>

    <div class="progress" id="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="results" id="results"></div>

  <div class="footer">
    Built with <a href="https://mozilla.github.io/pdf.js/" target="_blank" rel="noopener">PDF.js</a> · 100% 클라이언트 변환<br>
    <span style="margin-top:6px;display:inline-block;">© 2026 <strong style="color:var(--text-2);">COMMME</strong> · Built with Claude Code</span><br>
    <span class="sns-row">
      <a href="https://www.instagram.com/commme210/" target="_blank" rel="noopener" aria-label="Instagram @commme210"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></a>
      <a href="https://www.threads.com/@commme210" target="_blank" rel="noopener" aria-label="Threads @commme210"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.186 24h-.007c-3.581-.024-6.334-1.205-8.184-3.509C2.35 18.44 1.5 15.586 1.472 12.01v-.017c.03-3.579.879-6.43 2.525-8.482C5.845 1.205 8.6.024 12.18 0h.014c2.746.02 5.043.725 6.826 2.098 1.677 1.29 2.858 3.13 3.509 5.467l-2.04.569c-1.104-3.96-3.898-5.984-8.304-6.015-2.91.022-5.11.936-6.54 2.717C4.307 6.504 3.616 8.914 3.589 12c.027 3.086.718 5.496 2.057 7.164 1.43 1.781 3.631 2.695 6.54 2.717 2.623-.02 4.358-.631 5.8-2.045 1.647-1.613 1.618-3.593 1.09-4.798-.31-.71-.873-1.3-1.634-1.75-.192 1.352-.622 2.446-1.284 3.272-.886 1.102-2.14 1.704-3.73 1.79-1.202.065-2.361-.218-3.259-.801-1.063-.689-1.685-1.74-1.752-2.964-.065-1.19.408-2.285 1.33-3.082.88-.76 2.119-1.207 3.583-1.291a13.853 13.853 0 0 1 3.02.142c-.126-.742-.375-1.332-.75-1.757-.513-.586-1.308-.883-2.359-.89h-.029c-.844 0-1.992.232-2.721 1.32L7.734 7.847c.98-1.454 2.568-2.256 4.478-2.256h.044c3.194.02 5.097 1.975 5.287 5.388.108.046.216.094.321.142 1.49.7 2.58 1.761 3.154 3.07.797 1.82.871 4.79-1.548 7.158-1.85 1.81-4.094 2.628-7.277 2.65Zm1.003-11.69c-.242 0-.487.007-.739.021-1.836.103-2.98.946-2.916 2.143.067 1.256 1.452 1.839 2.784 1.767 1.224-.065 2.818-.543 3.086-3.71a10.5 10.5 0 0 0-2.215-.221z"/></svg></a>
    </span>
  </div>
</div>

<script type="module">
  import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs';
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const results = document.getElementById('results');
  const progress = document.getElementById('progress');
  const progressBar = document.getElementById('progressBar');

  let convertedFiles = [];

  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => handleFiles(e.target.files));

  ['dragenter', 'dragover'].forEach(ev => {
    dropZone.addEventListener(ev, e => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
  });
  ['dragleave', 'drop'].forEach(ev => {
    dropZone.addEventListener(ev, e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
    });
  });
  dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));

  async function handleFiles(files) {
    const pdfs = Array.from(files).filter(f => f.name.toLowerCase().endsWith('.pdf'));
    if (pdfs.length === 0) {
      alert('PDF 파일만 처리 가능해요.');
      return;
    }

    convertedFiles.forEach(f => URL.revokeObjectURL(f.url));
    convertedFiles = [];
    results.innerHTML = '';
    progress.style.display = 'block';
    progressBar.style.width = '0%';
    dropZone.classList.add('processing');

    const dpi = parseInt(document.getElementById('dpi').value);
    const format = document.getElementById('format').value;
    const ext = format.split('/')[1].replace('jpeg', 'jpg');

    let totalPages = 0;
    let donePages = 0;

    const pdfDocs = [];
    for (const file of pdfs) {
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data: buf}).promise;
      totalPages += pdf.numPages;
      pdfDocs.push({file, pdf});
    }

    for (const {file, pdf} of pdfDocs) {
      const stem = file.name.replace(/\.pdf$/i, '');
      const block = document.createElement('div');
      block.className = 'file-block';

      const header = document.createElement('div');
      header.className = 'file-header';
      const headerInfo = document.createElement('div');
      const fileName = document.createElement('div');
      fileName.className = 'file-name';
      fileName.textContent = `📄 ${stem}`;  // XSS-safe
      const meta = document.createElement('div');
      meta.className = 'file-meta';
      meta.textContent = `변환 중... 0 / ${pdf.numPages}`;
      headerInfo.append(fileName, meta);
      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.innerHTML = '<span style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;"></span>처리중';
      header.append(headerInfo, badge);

      const grid = document.createElement('div');
      grid.className = 'preview-grid';

      block.append(header, grid);
      results.appendChild(block);

      let fileDone = 0;
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const scale = dpi / 72;
        const viewport = page.getViewport({scale});

        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d');

        await page.render({canvasContext: ctx, viewport}).promise;

        const blob = await new Promise(r => canvas.toBlob(r, format, 0.95));
        const url = URL.createObjectURL(blob);
        const name = pdf.numPages === 1
          ? `${stem}.${ext}`
          : `${stem}_p${String(i).padStart(3, '0')}.${ext}`;

        convertedFiles.push({name, blob, url});

        const prev = document.createElement('div');
        prev.className = 'preview';
        prev.title = `클릭하면 ${name} 다운로드`;
        const img = document.createElement('img');
        img.src = url;
        img.alt = name;  // textContent-equivalent for attribute
        prev.appendChild(img);
        prev.onclick = () => downloadOne(name, blob);
        grid.appendChild(prev);

        donePages++;
        fileDone++;
        meta.textContent = `${fileDone} / ${pdf.numPages} 페이지 완료`;
        progressBar.style.width = (donePages / totalPages * 100) + '%';
      }

      meta.textContent = `${pdf.numPages} 페이지 · 미리보기 클릭으로 개별 다운로드`;
      badge.style.background = 'rgba(74,222,128,0.15)';
      badge.innerHTML = '<span>✓</span>완료';
    }

    dropZone.classList.remove('processing');

    if (convertedFiles.length > 0) {
      const actions = document.createElement('div');
      actions.className = 'actions';
      const dlBtn = document.createElement('button');
      dlBtn.className = 'btn btn-primary';
      dlBtn.textContent = `⬇ 전체 다운로드 (${convertedFiles.length}개)`;
      dlBtn.onclick = downloadAll;
      const rsBtn = document.createElement('button');
      rsBtn.className = 'btn btn-secondary';
      rsBtn.textContent = '초기화';
      rsBtn.onclick = reset;
      actions.append(dlBtn, rsBtn);
      results.appendChild(actions);
    }
  }

  function downloadOne(name, blob) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
  }

  async function downloadAll() {
    for (const f of convertedFiles) {
      const a = document.createElement('a');
      a.href = f.url;
      a.download = f.name;
      a.click();
      await new Promise(r => setTimeout(r, 100));
    }
  }

  function reset() {
    convertedFiles.forEach(f => URL.revokeObjectURL(f.url));
    convertedFiles = [];
    results.innerHTML = '';
    progress.style.display = 'none';
    progressBar.style.width = '0%';
    fileInput.value = '';
  }
</script>
</body>
</html>
